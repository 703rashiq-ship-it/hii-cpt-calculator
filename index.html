<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro HII CPT Calculator (Iron Man Edition)</title>
    <style>
        /* IRON MAN THEME: Deep Black, Armor Red (#c21807), and Gold (#ffcc00) */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #050505; color: #ffcc00; margin: 0; padding: 20px; }
        
        .app-wrapper { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; align-items: flex-start; }
        
        /* Panels with subtle glowing borders */
        .input-panel { flex: 2.1; background-color: #111; padding: 20px; border-radius: 8px; border: 1px solid #c21807; box-shadow: 0 0 15px rgba(194, 24, 7, 0.15); }
        .detail-panel { flex: 1.2; background-color: #111; padding: 20px; border-radius: 8px; border: 1px solid #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.15); position: sticky; top: 20px; }
        .summary-panel { flex: 1.3; background-color: #111; padding: 20px; border-radius: 8px; border: 1px solid #c21807; box-shadow: 0 0 15px rgba(194, 24, 7, 0.15); position: sticky; top: 20px; }
        
        h2, h3 { margin-top: 0; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; }
        
        .global-settings { background-color: #1a0505; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #c21807; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;}
        .global-settings label { font-weight: bold; color: #c21807; font-size: 14px; text-transform: uppercase;}
        
        .button-group { margin-top: 20px; display: flex; gap: 10px; }
        
        /* Styled Buttons */
        .add-btn { background-color: #c21807; color: #ffcc00; border: 1px solid #ffcc00; padding: 12px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: all 0.3s;}
        .add-btn:hover { background-color: #a01005; box-shadow: 0 0 12px rgba(255, 204, 0, 0.4); }
        
        .clear-btn { background-color: #ffcc00; color: #c21807; border: 1px solid #c21807; padding: 12px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: all 0.3s;}
        .clear-btn:hover { background-color: #e6b800; box-shadow: 0 0 12px rgba(194, 24, 7, 0.4); }
        
        .treatment-row { display: flex; gap: 12px; background: #0a0a0a; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 6px; align-items: flex-end;}
        
        /* Dark Theme Inputs */
        select, input { padding: 8px; border: 1px solid #c21807; border-radius: 4px; font-size: 13px; box-sizing: border-box; background-color: #000; color: #ffcc00; } 
        select:focus, input:focus { outline: none; border-color: #ffcc00; box-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }
        input::placeholder { color: #666; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(5) hue-rotate(350deg); }
        input[type="date"], input[type="text"] { font-family: monospace; }
        
        .drug-box { flex: 1; min-width: 120px; display: flex; flex-direction: column; }
        .drug-box label { font-size: 11px; margin-bottom: 4px; color: #c21807; font-weight: bold; text-transform: uppercase;}
        .drug-name { width: 100%; transition: border 0.3s; }

        .time-group { display: flex; gap: 8px; background-color: #111; padding: 6px 10px; border-radius: 4px; border: 1px solid #333; }
        .time-col { display: flex; flex-direction: column; }
        .time-col label { font-size: 11px; margin-bottom: 4px; color: #c21807; font-weight: bold; text-transform: uppercase;}
        .time-col input { width: 70px; text-align: center; }
        
        .remove-btn { background-color: #1a1a1a; color: #c21807; border: 1px solid #c21807; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 34px; margin-bottom: 1px; transition: all 0.2s;}
        .remove-btn:hover { background-color: #c21807; color: #000; }
        
        .result-line { margin-bottom: 15px; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 10px; color: #aaa;}
        .highlight { font-weight: bold; color: #ffcc00; display: block; font-size: 14px; margin-top: 5px; letter-spacing: 0.5px;}
        
        .tally-list { font-size: 15px; font-family: monospace; font-weight: bold; color: #ffcc00; list-style: none; padding: 0; margin: 10px 0;}
        .tally-list li { margin-bottom: 8px; padding: 10px; background: #0a0a0a; border-radius: 4px; text-align: left; border: 1px solid #c21807; display: flex; justify-content: space-between; box-shadow: 0 0 8px rgba(194, 24, 7, 0.2);}
        
        ul { margin: 5px 0 0 0; padding-left: 20px; font-size: 13px; color: #ccc;}

        @media (max-width: 1200px) {
            .app-wrapper { flex-direction: column; }
            .input-panel, .detail-panel, .summary-panel { width: 100%; position: static; box-sizing: border-box; }
            .treatment-row { flex-wrap: wrap; align-items: flex-start; }
            .drug-box, .time-group { width: 100%; }
            .time-group { flex-direction: column; gap: 10px; }
            .time-col input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- LEFT PANEL -->
    <div class="input-panel">
        <h2>Treatment Log</h2>
        
        <div class="global-settings">
            <label>Global Cut-Off:</label>
            <input type="date" id="cutOffDate" onchange="calculateAll()" title="Date of Service">
            <input type="text" id="cutOffTime" placeholder="HH:MM" maxlength="5" oninput="formatTime(this); calculateAll()" title="24-Hour Format (e.g., 1430)" style="width: 80px; text-align: center;">
        </div>

        <div id="rowsContainer"></div>
        
        <div class="button-group">
            <button class="add-btn" onclick="addRow()">+ Add Administration</button>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <!-- MIDDLE PANEL -->
    <div class="detail-panel">
        <h3>Detailed Breakdown</h3>
        <div class="result-line">Infusions:<span class="highlight" id="infusionResult">--</span></div>
        <div class="result-line">IV Pushes:<span class="highlight" id="injectionResult">--</span></div>
        <div class="result-line">Hydration:<span class="highlight" id="hydrationResult">--</span></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="summary-panel">
        <h3>Final CPT Summary</h3>
        <ul class="tally-list" id="tallyResult"><li>--</li></ul>
    </div>
</div>

<script>
    window.onload = function() {
        const savedData = localStorage.getItem('hiiCalculatorStateDOS');
        if (savedData) {
            const parsedData = JSON.parse(savedData);
            if (parsedData.global) {
                document.getElementById('cutOffDate').value = parsedData.global.cutOffDate || '';
                document.getElementById('cutOffTime').value = parsedData.global.cutOffTime || '';
            }
            if (parsedData.rows && parsedData.rows.length > 0) {
                parsedData.rows.forEach(item => addRow(item));
                calculateAll();
                return;
            }
        }
        addRow(); 
    };

    function clearAll() {
        if (confirm("Initiate Clean Slate Protocol? All treatments will be erased.")) {
            localStorage.removeItem('hiiCalculatorStateDOS');
            document.getElementById('rowsContainer').innerHTML = '';
            document.getElementById('cutOffDate').value = '';
            document.getElementById('cutOffTime').value = '';
            addRow();
            calculateAll();
        }
    }

    // STRICT 24-HOUR AUTO-FORMATTER (Fixes the 2 o'clock glitch)
    function formatTime(input) {
        let val = input.value.replace(/\D/g, ''); 
        
        if (val.length > 4) val = val.substring(0, 4); 
        
        // Clamp Hours to max 23
        if (val.length >= 2) {
            let hours = parseInt(val.substring(0, 2), 10);
            if (hours > 23) val = '23' + val.substring(2);
        }
        
        // Clamp Minutes to max 59
        if (val.length >= 4) {
            let mins = parseInt(val.substring(2, 4), 10);
            if (mins > 59) val = val.substring(0, 2) + '59';
        }

        if (val.length >= 3) {
            input.value = val.substring(0, 2) + ':' + val.substring(2);
        } else {
            input.value = val;
        }
    }

    function addRow(data = null) {
        const container = document.getElementById('rowsContainer');
        const rowId = 'row_' + Date.now();
        
        let defaultDos = '';
        if (!data) {
            const existingDates = document.querySelectorAll('.dos-date');
            if (existingDates.length > 0) {
                defaultDos = existingDates[existingDates.length - 1].value;
            } else {
                const today = new Date();
                const offset = today.getTimezoneOffset() * 60000;
                defaultDos = (new Date(today - offset)).toISOString().split('T')[0];
            }
        }

        const dosVal = data ? data.dos : defaultDos;
        const typeVal = data ? data.type : 'infusion';
        const drugVal = data ? data.drug : '';
        const startVal = data ? data.start : '';
        const stopVal = data ? data.stop : '';

        const rowHTML = `
            <div class="treatment-row" id="${rowId}">
                <div class="drug-box">
                    <label>Type</label>
                    <select class="type-select" onchange="calculateAll()">
                        <option value="infusion" ${typeVal === 'infusion' ? 'selected' : ''}>Infusion</option>
                        <option value="hydration" ${typeVal === 'hydration' ? 'selected' : ''}>Hydration</option>
                        <option value="injection" ${typeVal === 'injection' ? 'selected' : ''}>IV Push</option>
                    </select>
                </div>
                <div class="drug-box">
                    <label>Drug Name</label>
                    <input type="text" class="drug-name" placeholder="Name" value="${drugVal}" oninput="calculateAll()">
                </div>
                <div class="drug-box">
                    <label>DOS</label>
                    <input type="date" class="dos-date" value="${dosVal}" onchange="calculateAll()">
                </div>
                <div class="time-group">
                    <div class="time-col">
                        <label>Start time</label>
                        <input type="text" class="start-time" value="${startVal}" placeholder="HH:MM" maxlength="5" oninput="formatTime(this); calculateAll()">
                    </div>
                    <div class="time-col">
                        <label>End time</label>
                        <input type="text" class="stop-time" value="${stopVal}" placeholder="HH:MM" maxlength="5" oninput="formatTime(this); calculateAll()">
                    </div>
                </div>
                <button class="remove-btn" onclick="removeRow('${rowId}')">X</button>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', rowHTML);
    }

    function removeRow(rowId) {
        document.getElementById(rowId).remove();
        calculateAll();
    }

    function getAbsoluteMinutes(dateStr, timeStr) {
        if (!dateStr || !timeStr || timeStr.length !== 5) return null;
        let timeMins = new Date(`${dateStr}T${timeStr}`).getTime();
        if (isNaN(timeMins)) return null; 
        return Math.floor(timeMins / 60000);
    }

    function checkOverlap(start1, stop1, start2, stop2) {
        return Math.max(0, Math.min(stop1, stop2) - Math.max(start1, start2)) > 0;
    }

    function calculateAll() {
        const rows = document.querySelectorAll('.treatment-row');
        let treatments = [];
        let rowsToSave = []; 
        
        const cutOffDateStr = document.getElementById('cutOffDate').value;
        const cutOffTimeStr = document.getElementById('cutOffTime').value;
        let globalCutOffMins = null;
        if (cutOffDateStr && cutOffTimeStr && cutOffTimeStr.length === 5) {
            globalCutOffMins = getAbsoluteMinutes(cutOffDateStr, cutOffTimeStr);
        }

        let finalTallies = {}; 
        function addTally(dos, code, count) {
            if (count > 0 && dos) {
                if (!finalTallies[dos]) finalTallies[dos] = {};
                finalTallies[dos][code] = (finalTallies[dos][code] || 0) + count;
            }
        }

        rows.forEach(row => {
            let type = row.querySelector('.type-select').value;
            const drugInput = row.querySelector('.drug-name');
            let drug = drugInput.value.trim().toLowerCase();
            const dosStr = row.querySelector('.dos-date').value;
            const startStr = row.querySelector('.start-time').value;
            let stopStr = row.querySelector('.stop-time').value;

            rowsToSave.push({ dos: dosStr, type: type, drug: drugInput.value, start: startStr, stop: stopStr });

            // Dark Theme error state for empty drug name
            if (!drug && startStr.length === 5) {
                drugInput.style.border = "2px solid #ff0000";
                drugInput.style.backgroundColor = "#4a0000";
                drug = "unnamed"; 
            } else {
                drugInput.style.border = "1px solid #c21807";
                drugInput.style.backgroundColor = "#000";
            }

            if (dosStr && startStr.length === 5) {
                let start = getAbsoluteMinutes(dosStr, startStr);
                let stop = null;

                if (type === 'injection') {
                    stop = start;
                } else {
                    if (stopStr && stopStr.length === 5) {
                        stop = getAbsoluteMinutes(dosStr, stopStr);
                        if (stop < start) stop += (24 * 60); 
                    } 
                    if ((!stopStr || stopStr.length < 5) && globalCutOffMins) {
                        stop = globalCutOffMins;
                    }
                }

                if (globalCutOffMins && start !== null) {
                    if (start > globalCutOffMins) return; 
                    if (stop !== null && stop > globalCutOffMins) {
                        stop = globalCutOffMins; 
                    }
                }

                if (start !== null && stop !== null) {
                    let duration = stop - start;
                    if (type === 'infusion' && duration < 16) {
                        type = 'injection';
                        drug += " (short)";
                    }
                    treatments.push({ type, drug, start, stop, duration, dos: dosStr });
                }
            }
        });

        localStorage.setItem('hiiCalculatorStateDOS', JSON.stringify({
            global: { cutOffDate: cutOffDateStr, cutOffTime: cutOffTimeStr },
            rows: rowsToSave
        }));

        let infusions = treatments.filter(t => t.type === 'infusion');
        let hydrations = treatments.filter(t => t.type === 'hydration');
        let injections = treatments.filter(t => t.type === 'injection');

        // --- HIERARCHY 1: INFUSION LOGIC ---
        let infCodes = [];
        let initialInfusion = null;
        let concurrentBilled = false;
        let activeTimeline = []; 
        
        let drugGroups = {};
        infusions.forEach(inf => {
            if (!drugGroups[inf.drug]) drugGroups[inf.drug] = { totalTime: 0, blocks: [], dos: inf.dos };
            drugGroups[inf.drug].totalTime += inf.duration;
            drugGroups[inf.drug].blocks.push(inf);
        });

        for (let drug in drugGroups) {
            let primaryDos = drugGroups[drug].dos;
            if (drugGroups[drug].totalTime >= 16 && !initialInfusion) {
                initialInfusion = { drug: drug, blocks: drugGroups[drug].blocks };
                infCodes.push(`96365 (Initial - ${drug}) [DOS: ${primaryDos}]`);
                addTally(primaryDos, '96365', 1);
                
                let extraHours = Math.floor((drugGroups[drug].totalTime - 31) / 60);
                if (extraHours > 0) {
                    infCodes.push(`96366 x ${extraHours} (Addtl hr - ${drug})`);
                    addTally(primaryDos, '96366', extraHours);
                }
                
                activeTimeline = activeTimeline.concat(drugGroups[drug].blocks);
                delete drugGroups[drug]; 
                break; 
            }
        }

        let remainingDrugs = [];
        for (let drug in drugGroups) {
            remainingDrugs.push({
                drug: drug,
                blocks: drugGroups[drug].blocks,
                totalTime: drugGroups[drug].totalTime,
                dos: drugGroups[drug].dos,
                earliestStart: Math.min(...drugGroups[drug].blocks.map(b => b.start))
            });
        }
        remainingDrugs.sort((a, b) => a.earliestStart - b.earliestStart);

        remainingDrugs.forEach(grp => {
            let isConcurrent = false;
            grp.blocks.forEach(b1 => {
                activeTimeline.forEach(b2 => {
                    if (checkOverlap(b1.start, b1.stop, b2.start, b2.stop)) isConcurrent = true;
                });
            });

            if (isConcurrent) {
                if (!concurrentBilled) {
                    infCodes.push(`96368 (Concurrent - ${grp.drug}) [DOS: ${grp.dos}]`);
                    addTally(grp.dos, '96368', 1);
                    concurrentBilled = true; 
                } else {
                    infCodes.push(`Not billable (Concurrent max 1 - ${grp.drug})`);
                }
            } else {
                infCodes.push(`96367 (Sequential - ${grp.drug}) [DOS: ${grp.dos}]`);
                addTally(grp.dos, '96367', 1);
                
                let extraHours = Math.floor((grp.totalTime - 31) / 60);
                if (extraHours > 0) {
                    infCodes.push(`96366 x ${extraHours} (Addtl hr - ${grp.drug})`);
                    addTally(grp.dos, '96366', extraHours);
                }
            }
            activeTimeline = activeTimeline.concat(grp.blocks);
        });

        // --- HIERARCHY 2: INJECTION LOGIC ---
        let injCodes = [];
        let hasPrimaryPush = false;
        let firstPushAssigned = false;

        let injDrugGroups = {};
        injections.forEach(inj => {
            if (!injDrugGroups[inj.drug]) injDrugGroups[inj.drug] = [];
            injDrugGroups[inj.drug].push(inj);
        });

        for (let drug in injDrugGroups) {
            let blocks = injDrugGroups[drug];
            blocks.sort((a, b) => a.start - b.start); 

            if (!initialInfusion && !firstPushAssigned) {
                injCodes.push(`96374 (Initial Push - ${drug}) [DOS: ${blocks[0].dos}]`);
                addTally(blocks[0].dos, '96374', 1);
                firstPushAssigned = true;
                hasPrimaryPush = true;
            } else {
                injCodes.push(`96375 (Subsequent Push - ${drug}) [DOS: ${blocks[0].dos}]`);
                addTally(blocks[0].dos, '96375', 1);
            }

            let lastBilledTime = blocks[0].start; 
            for (let i = 1; i < blocks.length; i++) {
                let gap = blocks[i].start - lastBilledTime;

                if (gap >= 31) {
                    injCodes.push(`96376 (Same drug push - ${drug}) [DOS: ${blocks[i].dos}]`);
                    addTally(blocks[i].dos, '96376', 1);
                    lastBilledTime = blocks[i].start; 
                } else {
                    injCodes.push(`Not billable (< 31m gap - ${drug})`);
                }
            }
        }

        // --- HIERARCHY 3: HYDRATION LOGIC ---
        let hydCodes = [];
        let grossHydTime = hydrations.reduce((sum, h) => sum + h.duration, 0);
        let primaryHydDos = hydrations.length > 0 ? hydrations[0].dos : null;
        let infusionMinutes = new Set();
        
        activeTimeline.forEach(block => {
            for (let m = block.start; m < block.stop; m++) infusionMinutes.add(m);
        });

        let netHydrationMinutes = 0;
        let countedHydrationMinutes = new Set(); 

        hydrations.forEach(hyd => {
            for (let m = hyd.start; m < hyd.stop; m++) {
                if (!infusionMinutes.has(m) && !countedHydrationMinutes.has(m)) {
                    countedHydrationMinutes.add(m);
                    netHydrationMinutes++;
                }
            }
        });

        if (netHydrationMinutes >= 31) {
            if (initialInfusion || hasPrimaryPush) {
                hydCodes.push(`96361 (Subsequent Hydration - ${netHydrationMinutes}m net) [DOS: ${primaryHydDos}]`);
                addTally(primaryHydDos, '96361', 1);
            } else {
                hydCodes.push(`96360 (Initial Hydration - ${netHydrationMinutes}m net) [DOS: ${primaryHydDos}]`);
                addTally(primaryHydDos, '96360', 1);
            }
            
            let extraHydHours = Math.floor((netHydrationMinutes - 31) / 60);
            if (extraHydHours > 0) {
                hydCodes.push(`96361 x ${extraHydHours} (Addtl hr)`);
                addTally(primaryHydDos, '96361', extraHydHours);
            }
        } else if (grossHydTime > 0) {
            hydCodes.push(`Not billable (Net time ${netHydrationMinutes}m is < 31m)`);
        }

        // --- RENDER OUTPUT ---
        const renderList = (arr) => arr.length > 0 ? "<ul><li>" + arr.join("</li><li>") + "</li></ul>" : "--";
        document.getElementById('infusionResult').innerHTML = renderList(infCodes);
        document.getElementById('injectionResult').innerHTML = renderList(injCodes);
        document.getElementById('hydrationResult').innerHTML = renderList(hydCodes);

        let tallyHTML = "";
        let sortedDates = Object.keys(finalTallies).sort();
        
        if (sortedDates.length === 0) {
            tallyHTML = "<li>--</li>";
        } else {
            sortedDates.forEach(dos => {
                let codesOnDate = finalTallies[dos];
                let sortedCodes = Object.keys(codesOnDate).sort();
                
                sortedCodes.forEach(code => {
                    let units = codesOnDate[code];
                    let unitText = units > 1 ? 'Units' : 'Unit';
                    tallyHTML += `<li><span>${dos}</span> <span>${code}</span> <span>${units} ${unitText}</span></li>`;
                });
            });
        }
        document.getElementById('tallyResult').innerHTML = tallyHTML;
    }
</script>
</body>
</html>
